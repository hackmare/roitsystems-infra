# NATS server with JetStream enabled
# This node is internal-only; no public port exposure.

port: 4222

# HTTP monitoring port (internal only)
http_port: 8222

jetstream {
  store_dir: /data
  max_memory_store: 128MB
  max_file_store: 1GB
}

# Conservative limits for a single-node contact-form workload
max_connections: 100
max_payload: 1MB
